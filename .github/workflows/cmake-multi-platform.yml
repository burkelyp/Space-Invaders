name: CMake on multiple platforms

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
          - os: windows-latest
            build_type: Release
            c_compiler: cl
            cpp_compiler: cl

    steps:
    - uses: actions/checkout@v4

    # Install SDL2 for Linux (Ubuntu)
    - name: Install SDL2 (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y libsdl2-dev

    # Install SDL2 manually for Windows
    - name: Install SDL2 (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Download and extract SDL2
        Invoke-WebRequest -Uri "https://www.libsdl.org/release/SDL2-2.26.5-win32-x86.zip" -OutFile "SDL2.zip"
        Expand-Archive -Path "SDL2.zip" -DestinationPath "C:\SDL2"
        
        # Set SDL2_DIR environment variable
        $env:SDL2_DIR = "C:\SDL2\SDL2-2.26.5"
        echo "SDL2 installed in C:\SDL2\SDL2-2.26.5"

        # Set the environment variable in the CMake step
        echo "SDL2_DIR=$env:SDL2_DIR" >> $GITHUB_ENV

    # Set reusable strings
    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # Configure CMake
    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DSDL2_DIR=$env:SDL2_DIR
        -S ${{ github.workspace }}

    # Build your program with the given configuration
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    # Run tests if applicable
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        ctest --output-on-failure --build-config ${{ matrix.build_type }}

